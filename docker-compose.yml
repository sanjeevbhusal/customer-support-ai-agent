services:
  postgres:
    image: pgvector/pgvector:pg18-trixie
    container_name: customer-support-agent
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vectordb
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql

volumes:
  pgdata:
